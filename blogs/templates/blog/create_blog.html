{% extends 'base.html' %}

{% block title %}Create Blog{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto">

    <div class="bg-white rounded-3xl shadow-xl border border-slate-200 overflow-hidden">

        <div class="bg-gradient-to-r from-blue-600 to-indigo-700 px-8 py-6">
            <h1 class="text-3xl font-bold text-white">Create New Blog</h1>
            <p class="text-blue-100 mt-2">
                Write and publish your new blog post
            </p>
        </div>

        <div class="p-8">
            <form method="POST" class="space-y-6">
                {% csrf_token %}

                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">
                        Blog Title
                    </label>
                    <input
                        type="text"
                        name="title"
                        placeholder="Enter blog title"
                        required
                        class="w-full px-4 py-3 rounded-2xl border border-slate-300 focus:outline-none focus:ring-2 focus:ring-blue-500"
                    >
                </div>

                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">
                        Blog Content
                    </label>
                    <textarea
                        name="content"
                        rows="8"
                        placeholder="Write your blog content here..."
                        required
                        class="w-full px-4 py-3 rounded-2xl border border-slate-300 focus:outline-none focus:ring-2 focus:ring-blue-500"
                    ></textarea>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-3">
                        Select Categories
                    </label>

                    <div class="grid md:grid-cols-2 gap-3">
                        {% for category in categories %}
                            <label class="flex items-center space-x-3 bg-slate-50 border border-slate-200 rounded-2xl px-4 py-3 hover:bg-slate-100 cursor-pointer">
                                <input
                                    type="checkbox"
                                    name="categories"
                                    value="{{ category.id }}"
                                    class="w-5 h-5 text-blue-600 rounded"
                                >
                                <span class="text-slate-700 font-medium">
                                    {{ category.name }}
                                </span>
                            </label>
                        {% endfor %}
                    </div>
                </div>

                <div class="flex justify-end gap-4 pt-4">
                    <a href="{% url 'blog_list' %}"
                       class="px-6 py-3 rounded-2xl border border-slate-300 text-slate-700 font-medium hover:bg-slate-100 transition">
                        Cancel
                    </a>

                    <button
                        type="submit"
                        class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-3 rounded-2xl font-semibold shadow-md transition"
                    >
                        Publish Blog
                    </button>
                </div>

            </form>
        </div>

    </div>

</div>
{% endblock %}
