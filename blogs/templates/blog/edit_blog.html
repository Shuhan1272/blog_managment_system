{% extends 'base.html' %}

{% block title %}Edit Blog{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto">

    <div class="bg-white rounded-3xl shadow-xl border border-slate-200 overflow-hidden">

        <div class="bg-gradient-to-r from-amber-500 to-orange-600 px-8 py-6">
            <h1 class="text-3xl font-bold text-white">
                Edit Blog
            </h1>
            <p class="text-amber-100 mt-2">
                Update your blog post details
            </p>
        </div>

        <div class="p-8">
            <form method="POST" class="space-y-6">
                {% csrf_token %}

                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">
                        Blog Title
                    </label>
                    <input
                        type="text"
                        name="title"
                        value="{{ blog.title }}"
                        required
                        class="w-full px-4 py-3 rounded-2xl border border-slate-300 focus:outline-none focus:ring-2 focus:ring-amber-500"
                    >
                </div>

                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">
                        Blog Content
                    </label>
                    <textarea
                        name="content"
                        rows="8"
                        required
                        class="w-full px-4 py-3 rounded-2xl border border-slate-300 focus:outline-none focus:ring-2 focus:ring-amber-500"
                    >{{ blog.content }}</textarea>
                </div>

                <div class="flex justify-end gap-4 pt-4">
                    <a href="{% url 'blog_details' blog.id %}"
                       class="px-6 py-3 rounded-2xl border border-slate-300 text-slate-700 font-medium hover:bg-slate-100 transition">
                        Cancel
                    </a>

                    <button
                        type="submit"
                        class="bg-amber-500 hover:bg-amber-600 text-white px-8 py-3 rounded-2xl font-semibold shadow-md transition"
                    >
                        Update Blog
                    </button>
                </div>

            </form>
        </div>

    </div>

</div>
{% endblock %}
