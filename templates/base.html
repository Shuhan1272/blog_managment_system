<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Blog Management System{% endblock %}</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body class="min-h-screen flex flex-col bg-slate-100 text-slate-800">

    <!-- Navbar -->
    <nav class="bg-slate-900 shadow-lg">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">

                <!-- Logo -->
                <a href="{% url 'blog_list' %}"
                   class="text-white text-2xl font-bold tracking-wide">
                    BlogSys
                </a>

                <!-- Navigation -->
                <div class="flex items-center space-x-4">

                    {% if request.session.user_id %}
                        

                        <a href="{% url 'blog_list' %}"
                           class="text-slate-200 hover:text-white transition font-medium">
                            Blogs
                        </a>

                        <a href="{% url 'dashboard' %}"
                           class="text-slate-200 hover:text-white transition font-medium">
                            Dashboard
                        </a>

                        <a href="{% url 'create_blog' %}"
                            class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-xl font-medium transition">
                                + Create Blog
                        </a>

                        <a href="{% url 'logout' %}"
                           class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-xl font-medium transition">
                            Logout
                        </a>

                    {% else %}
                        <a href="{% url 'login' %}"
                           class="text-slate-200 hover:text-white transition font-medium">
                            Login
                        </a>

                        <a href="{% url 'register' %}"
                           class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-xl font-medium transition">
                            Register
                        </a>
                    {% endif %}

                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-grow w-full max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">

        <!-- Django Messages -->
        {% if messages %}
            <div class="space-y-3 mb-6">
                {% for message in messages %}
                    <div class="rounded-2xl px-4 py-3 shadow-sm border
                        {% if message.tags == 'success' %}
                            bg-emerald-50 border-emerald-200 text-emerald-700
                        {% elif message.tags == 'error' %}
                            bg-red-50 border-red-200 text-red-700
                        {% elif message.tags == 'warning' %}
                            bg-yellow-50 border-yellow-200 text-yellow-700
                        {% else %}
                            bg-blue-50 border-blue-200 text-blue-700
                        {% endif %}
                    ">
                        {{ message }}
                    </div>
                {% endfor %}
            </div>
        {% endif %}

        {% block content %}
        {% endblock %}

    </main>

    <!-- Footer -->
    <footer class="bg-slate-900 text-slate-300">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-5 text-center text-sm">
            © 2026 Blog Management System. All Rights Reserved.
        </div>
    </footer>

</body>
</html>
